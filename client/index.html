<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Google Fonts Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&family=Noto+Sans+Devanagari&display=swap"
      rel="stylesheet"
    />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dehaat News - Stay Updated</title>
    <meta name="description" content="Get the latest news and updates on Dehaat News." />

    <!-- Optimized Favicon -->
    <link rel="icon" href="./dehaatnews.png" type="image/png" sizes="512x512" />

    <!-- ✅ Open Graph Meta Tags (For Facebook, LinkedIn, WhatsApp) -->
    <meta property="og:title" content="Dehaat News - Stay Updated" />
    <meta property="og:description" content="Stay updated with agricultural and global news." />
    <meta property="og:image" content="https://dehaatnews.com/dehaatnews.png" />
    <meta property="og:image:secure_url" content="https://dehaatnews.com/dehaatnews.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="https://dehaatnews.com" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <!-- ✅ Twitter Meta Tags (For Twitter Previews) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dehaat News - Stay Updated" />
    <meta name="twitter:description" content="Get the latest updates from Dehaat News." />
    <meta name="twitter:image" content="https://dehaatnews.com/dehaatnews.png" />
    <meta name="twitter:image:alt" content="Dehaat News Logo" />

    <!-- ✅ Ensure No Indexing Issues -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- ✅ Dynamic Meta Tags for Each News Article (Will Be Replaced via JavaScript for CSR Apps) -->
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // Simulate fetching dynamic meta data (replace this logic in React)
        const urlParams = new URLSearchParams(window.location.search);
        const newsTitle = urlParams.get("title") || "Dehaat News - Stay Updated";
        const newsDesc = urlParams.get("desc") || "Stay updated with agricultural and global news.";
        const newsImage = urlParams.get("image") || "https://dehaatnews.com/dehaatnews.png";
        const newsURL = window.location.href;

        document.querySelector('meta[property="og:title"]').setAttribute("content", newsTitle);
        document.querySelector('meta[property="og:description"]').setAttribute("content", newsDesc);
        document.querySelector('meta[property="og:image"]').setAttribute("content", newsImage);
        document.querySelector('meta[property="og:url"]').setAttribute("content", newsURL);

        document.querySelector('meta[name="twitter:title"]').setAttribute("content", newsTitle);
        document.querySelector('meta[name="twitter:description"]').setAttribute("content", newsDesc);
        document.querySelector('meta[name="twitter:image"]').setAttribute("content", newsImage);
      });
    </script>
  </head>

  <body style="font-family: 'Poppins', 'Noto Sans Devanagari', Arial, Helvetica, sans-serif;">
    <!-- 🚀 React App Root -->
    <div id="root"></div>

    <!-- 🚀 Loads React App -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
